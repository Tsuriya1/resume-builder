services:
  postgres:
    image: postgres:16-alpine
    container_name: resume_builder_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-resume_builder}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-resume_builder}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

